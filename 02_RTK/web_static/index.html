<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTK Path Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1 id="pageTitle">RTK Path Visualizer</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
    <button id="langToggle" class="lang-toggle" title="Switch to Chinese" aria-label="Switch language">◌</button>
  </header>

  <section class="toolbar">
    <label id="csvLabel">CSV Route File
      <input type="file" id="csvFile" accept=".csv,.txt" />
    </label>
    <label id="rtkSourceLabel">RTK Source
      <select id="rtkSourceSelect" disabled></select>
    </label>
    <button id="btnFindMe">Find Me</button>
    <button id="btnCenterCurrent">Center Current</button>
    <button id="btnEditRoute">Edit Route</button>
    <button id="btnUndoNode" disabled>Undo Node</button>
    <div id="editRouteOptions" class="edit-options" aria-hidden="true">
      <label>tol(m)
        <input type="number" id="editTolerance" min="0.1" step="0.1" value="0.5" />
      </label>
      <label>speed(m/s)
        <input type="number" id="editMaxSpeed" min="0" step="0.1" value="1.0" />
      </label>
    </div>
    <button id="btnStartSim">Start Simulation</button>
    <button id="btnExportRoute">Export Route CSV</button>
    <button id="btnClearTrack">Clear Track</button>
    <button id="btnExportLog">Export Log</button>
  </section>

  <main>
    <div id="map"></div>
    <aside>
      <pre id="raw-json" style="background:#1a1a1a;color:#eee;font-family:monospace;font-size:0.78rem;line-height:1.5;padding:10px;border-radius:4px;overflow-x:auto;white-space:pre-wrap;margin:0;height:100%;box-sizing:border-box;">waiting...</pre>
      <!-- hidden stubs to keep rtk_visualizer.js happy -->
      <div style="display:none">
        <h3 id="cardCurrentTitle"></h3>
        <h3 id="cardDualTitle"></h3>
        <h3 id="cardMissionTitle"></h3>
        <h3 id="cardEventTitle"></h3>
        <span id="labelLat"></span>
        <span id="labelLon"></span>
        <span id="labelSource"></span>
        <span id="labelSats"></span>
        <span id="labelSpeed"></span>
        <span id="labelHeading"></span>
        <span id="labelBaseline"></span>
        <span id="labelReached"></span>
        <span id="labelTarget"></span>
        <span id="labelDistance"></span>
        <strong id="latVal"></strong>
        <strong id="lonVal"></strong>
        <strong id="srcVal"></strong>
        <strong id="fixVal"></strong>
        <strong id="satVal"></strong>
        <strong id="hdopVal"></strong>
        <strong id="spdVal"></strong>
        <strong id="headingVal"></strong>
        <strong id="baselineVal"></strong>
        <strong id="reachVal"></strong>
        <strong id="targetVal"></strong>
        <strong id="distVal"></strong>
        <div id="dualRtkInfo"></div>
        <ul id="eventList"></ul>
      </div>
    </aside>
  </main>

  <script>
    const rawJson = document.getElementById('raw-json');
    const wsData = new WebSocket('ws://localhost:8776');
    wsData.onmessage = e => { rawJson.textContent = JSON.stringify(JSON.parse(e.data), null, 2); };
  </script>

  <script>
    function loadCss(href) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.onload = () => resolve(href);
        link.onerror = () => reject(new Error(`CSS load failed: ${href}`));
        document.head.appendChild(link);
      });
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = false;
        script.onload = () => resolve(src);
        script.onerror = () => reject(new Error(`Script load failed: ${src}`));
        document.body.appendChild(script);
      });
    }

    async function loadFirst(candidates, loader) {
      let lastErr = null;
      for (const c of candidates) {
        try {
          return await loader(c);
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error('No candidates');
    }

    async function boot() {
      try {
        await loadFirst(['./assets/vendor/leaflet/leaflet.css'], loadCss);
        await loadFirst(['./assets/vendor/leaflet/leaflet.js'], loadScript);
        await loadScript('rtk_visualizer.js');
      } catch (err) {
        console.error(err);
        alert('Map component load failed: verify local Leaflet files or internet access.');
      }
    }

    boot();
  </script>
</body>
</html>
