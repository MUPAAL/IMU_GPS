<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNO085 IMU Visualizer</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #raw-json { background: #1a1a1a; color: #eee; font-family: monospace; font-size: 0.78rem; line-height: 1.5; padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; flex: 1; margin: 0; }
    #data-panel { display: flex; flex-direction: column; }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>BNO085 IMU Visualizer</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- ===== Toolbar ===== -->
  <div class="toolbar">
    <!-- North calibration group -->
    <div class="toolbar-group">
      <input type="number" id="manual-heading" min="0" max="359" step="1"
             value="0" title="Current heading in degrees (0=N, 90=E)" />
      <span class="unit">°</span>
      <button id="btn-set-heading" title="Set current IMU direction to this angle">
        Set Heading
      </button>
    </div>
    <button id="btn-clear-north" title="Remove north calibration offset">
      Clear North
    </button>

    <span class="toolbar-divider"></span>

    <!-- View controls -->
    <button id="btn-reset-view" title="Reset camera to default position">
      Reset View
    </button>
    <button id="btn-lock-yaw" class="btn-toggle" title="Show yaw only (ignore pitch/roll)">
      Lock Yaw
    </button>
    <button id="btn-top-north" class="btn-toggle" title="Top view with north-up and yaw lock">
      Top North
    </button>
    <button id="btn-pause" class="btn-toggle" title="Freeze / resume live data">
      Pause
    </button>
  </div>

  <!-- ===== Main ===== -->
  <div class="main-container">

    <!-- 3D Canvas -->
    <div id="canvas-container">
      <canvas id="compassCanvas"></canvas>
      <div class="canvas-hint">Drag to rotate · Scroll to zoom</div>
    </div>

    <!-- Data Panel -->
    <div id="data-panel">
      <pre id="raw-json">waiting...</pre>
    </div>

  </div>

  <!-- Three.js via CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="imu_visualizer.js"></script>
  <script>
    const rawJson = document.getElementById('raw-json');
    const ws = new WebSocket('ws://localhost:8766');
    ws.onmessage = e => { rawJson.textContent = JSON.stringify(JSON.parse(e.data), null, 2); };
  </script>

</body>
</html>
