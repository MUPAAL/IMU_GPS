<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Recorder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>Data Recorder</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <div class="main-container">

    <!-- Control Panel -->
    <div class="control-panel">

      <!-- Recording Status Card -->
      <div class="panel-section">
        <h3>Recording</h3>
        <div class="record-status">
          <div class="record-indicator" id="recordIndicator"></div>
          <span id="recordStatusText">Stopped</span>
        </div>
        <div class="data-row">
          <span class="label">File</span>
          <span class="value" id="currentFile">—</span>
        </div>
        <div class="data-row">
          <span class="label">Rows</span>
          <span class="value" id="rowCount">0</span>
        </div>
        <div class="data-row">
          <span class="label">Elapsed</span>
          <span class="value" id="elapsed">0.0s</span>
        </div>

        <div class="button-group">
          <button class="btn-start" id="btnStart">Start Recording</button>
          <button class="btn-stop" id="btnStop" disabled>Stop Recording</button>
        </div>
      </div>

      <!-- Data Sources Card -->
      <div class="panel-section">
        <h3>Data Sources</h3>
        <div class="source-row">
          <div class="source-dot" id="srcImu"></div>
          <span>IMU (ws://localhost:8766)</span>
        </div>
        <div class="source-row">
          <div class="source-dot" id="srcRtk"></div>
          <span>RTK (ws://localhost:8776)</span>
        </div>
        <div class="source-row">
          <div class="source-dot" id="srcRobot"></div>
          <span>Robot (ws://localhost:8796)</span>
        </div>
      </div>

    </div>

    <!-- File List Panel -->
    <div class="file-panel">
      <div class="panel-section">
        <h3>Recorded Files</h3>
        <div id="fileList" class="file-list">
          <div class="file-empty">No files yet</div>
        </div>
      </div>
    </div>

  </div>

  <script src="recorder_visualizer.js"></script>

</body>
</html>
