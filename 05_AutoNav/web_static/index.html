<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNav Controller</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>AutoNav Controller</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- ===== Toolbar ===== -->
  <div class="toolbar">
    <label class="file-upload">
      Upload CSV
      <input type="file" id="csvUpload" accept=".csv" />
    </label>
    <button id="btnFindMe" title="Center map on robot">Find Me</button>
    <div class="toolbar-divider"></div>
    <button id="btnStartNav" class="btn-nav-start">Start Nav</button>
    <button id="btnStopNav" class="btn-nav-stop">Stop Nav</button>
  </div>

  <!-- ===== Main ===== -->
  <main>
    <!-- Map -->
    <div id="map"></div>

    <!-- Data Panel -->
    <aside>
      <!-- Nav State -->
      <div class="card">
        <h3>Navigation</h3>
        <div class="row"><span>State</span><span id="navState">idle</span></div>
        <div class="row"><span>Progress</span><span id="navProgress">0/0</span></div>
        <div class="row"><span>Distance</span><span id="navDistance">—</span></div>
        <div class="row"><span>Bearing Error</span><span id="navBearingErr">—</span></div>
        <div class="row"><span>GPS Quality</span><span id="navFixQuality">0</span></div>
      </div>

      <!-- Mode Control -->
      <div class="card">
        <h3>Mode</h3>
        <div class="mode-group">
          <label><span>Nav Mode</span>
            <select id="selNavMode">
              <option value="p2p">P2P</option>
              <option value="pure_pursuit">Pure Pursuit</option>
            </select>
          </label>
          <label><span>Filter</span>
            <select id="selFilterMode">
              <option value="moving_avg">Moving Avg</option>
              <option value="kalman">Kalman</option>
            </select>
          </label>
        </div>
      </div>

      <!-- Control Output -->
      <div class="card">
        <h3>Control Output</h3>
        <div class="row"><span>Linear</span><span id="ctrlLinear">0.000</span></div>
        <div class="row"><span>Angular</span><span id="ctrlAngular">0.000</span></div>
      </div>

      <!-- Coverage Planner -->
      <div class="card">
        <h3>Coverage Planner</h3>
        <div class="coverage-form">
          <label>Row Spacing (m) <input type="number" id="cpSpacing" value="1.0" step="0.1" min="0.1" /></label>
          <label>Direction (deg) <input type="number" id="cpDirection" value="0" step="1" /></label>
          <label>Overlap (0-1) <input type="number" id="cpOverlap" value="0" step="0.05" min="0" max="0.99" /></label>
          <label>Tolerance (m) <input type="number" id="cpTolerance" value="1.0" step="0.1" min="0.1" /></label>
          <label>Max Speed (m/s) <input type="number" id="cpMaxSpeed" value="0.5" step="0.1" min="0.1" /></label>
          <button id="btnGenCoverage">Generate Coverage Path</button>
          <p class="hint">Click map to add boundary points, then generate.</p>
        </div>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="autonav_visualizer.js"></script>

</body>
</html>
