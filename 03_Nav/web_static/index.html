<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nav Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1 id="pageTitle">Nav Dashboard</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
    <span id="langToggle" style="display:none"></span>
  </header>

  <!-- ===== Main ===== -->
  <div class="main-container">

    <!-- Left: 3D + Map stacked -->
    <div class="left-column">
      <div id="canvas-container">
        <canvas id="compassCanvas"></canvas>
        <div class="canvas-hint">Drag to rotate &middot; Scroll to zoom</div>
      </div>
      <div id="map"></div>
    </div>

    <!-- Right: Raw JSON -->
    <div id="data-panel" style="display:flex;flex-direction:column;">
      <pre id="raw-json" style="background:#1a1a1a;color:#eee;font-family:monospace;font-size:0.78rem;line-height:1.5;padding:10px;border-radius:4px;overflow-x:auto;white-space:pre-wrap;margin:0;flex:1;">waiting...</pre>
    </div>

  </div>

  <!-- hidden stubs to keep nav_visualizer.js happy -->
  <div style="display:none">
    <input id="manual-heading" />
    <button id="btn-set-heading"></button>
    <button id="btn-clear-north"></button>
    <button id="btn-lock-yaw"></button>
    <button id="btn-top-north"></button>
    <button id="btn-pause"></button>
    <label id="csvLabel"><input id="csvFile" /></label>
    <button id="btnCenterCurrent"></button>
    <button id="btnEditRoute"></button>
    <button id="btnUndoNode"></button>
    <div id="editRouteOptions">
      <input id="editTolerance" />
      <input id="editMaxSpeed" />
    </div>
    <button id="btnStartSim"></button>
    <button id="btnExportRoute"></button>
    <span id="calBadge"><span class="cal-dot"></span><span id="calText"></span></span>
    <span id="hzDisplay"></span>
    <span id="steps"></span>
    <h3 id="cardCurrentTitle"></h3>
    <h3 id="cardMissionTitle"></h3>
    <h3 id="cardEventTitle"></h3>
    <span id="labelLat"></span><strong id="latVal"></strong>
    <span id="labelLon"></span><strong id="lonVal"></strong>
    <span id="labelSource"></span><strong id="srcVal"></strong>
    <strong id="fixVal"></strong>
    <span id="labelSats"></span><strong id="satVal"></strong>
    <strong id="hdopVal"></strong>
    <span id="labelSpeed"></span><strong id="spdVal"></strong>
    <span id="labelReached"></span><strong id="reachVal"></strong>
    <span id="labelTarget"></span><strong id="targetVal"></strong>
    <span id="labelDistance"></span><strong id="distVal"></strong>
    <ul id="eventList"></ul>
    <!-- imu data panel stubs -->
    <span id="rot_qi"></span><span id="rot_qj"></span><span id="rot_qk"></span><span id="rot_qr"></span>
    <span id="heading_deg"></span><span id="heading_dir"></span>
    <span id="euler_roll"></span><span id="euler_pitch"></span><span id="euler_yaw"></span>
    <span id="accel_x"></span><span id="accel_y"></span><span id="accel_z"></span>
    <span id="lin_x"></span><span id="lin_y"></span><span id="lin_z"></span>
    <span id="grav_x"></span><span id="grav_y"></span><span id="grav_z"></span>
    <span id="gyro_x"></span><span id="gyro_y"></span><span id="gyro_z"></span>
    <span id="game_qi"></span><span id="game_qj"></span><span id="game_qk"></span><span id="game_qr"></span>
    <span id="mag_x"></span><span id="mag_y"></span><span id="mag_z"></span>
  </div>

  <!-- Leaflet + Three.js -->
  <script>
    function loadCss(href) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet'; link.href = href;
        link.onload = () => resolve(href);
        link.onerror = () => reject(new Error('CSS load failed: ' + href));
        document.head.appendChild(link);
      });
    }
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src; script.async = false;
        script.onload = () => resolve(src);
        script.onerror = () => reject(new Error('Script load failed: ' + src));
        document.body.appendChild(script);
      });
    }
    async function boot() {
      try {
        await loadCss('./assets/vendor/leaflet/leaflet.css');
        await loadScript('./assets/vendor/leaflet/leaflet.js');
      } catch (err) { console.error('Leaflet load failed:', err); }
      window.dispatchEvent(new Event('leaflet-ready'));
    }
    boot();
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="nav_visualizer.js"></script>

  <script>
    const rawJson = document.getElementById('raw-json');
    const ws = new WebSocket(`ws://${location.hostname}:${Number(location.port || 8785) + 1}`);
    ws.onmessage = e => { rawJson.textContent = JSON.stringify(JSON.parse(e.data), null, 2); };
  </script>

</body>
</html>
