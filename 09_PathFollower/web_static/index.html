<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PathFollower Control</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app">

  <!-- ── Fullscreen joystick (base layer z-index:0) ── -->
  <div id="joystick-zone">
    <span id="joystick-hint">TOUCH TO CONTROL</span>
  </div>

  <!-- Warning banner (below top bar, z-index:20) -->
  <div id="warn-banner">⚠ WATCHDOG TIMEOUT — MOTORS STOPPED</div>

  <!-- ── Top bar ── -->
  <div id="top-bar">
    <span class="title">PATHFOLLOWER</span>
    <span id="status-dot"></span>
    <span id="status-text">OFFLINE</span>
    <!-- <span id="last-msg-type" class="tiny-label">--</span> -->
  </div>

  <!-- ── Top-left HUD: IMU + Compass ── -->
  <div id="hud-left">
    <div class="hud-panel-title">COMPASS</div>
    <div id="compass-svg-wrap">
      <svg id="compass-svg" viewBox="0 0 100 100">
        <!-- Outer ring -->
        <circle cx="50" cy="50" r="46" fill="none" stroke="#1e2d3d" stroke-width="2"/>
        <!-- Cardinal ticks -->
        <g stroke="#5a7080" stroke-width="1.5">
          <line x1="50" y1="6"  x2="50" y2="14"/>
          <line x1="94" y1="50" x2="86" y2="50"/>
          <line x1="50" y1="94" x2="50" y2="86"/>
          <line x1="6"  y1="50" x2="14" y2="50"/>
        </g>
        <!-- Cardinal labels -->
        <text x="50" y="22" text-anchor="middle" fill="#00d4ff" font-size="10" font-family="Courier New">N</text>
        <text x="50" y="84" text-anchor="middle" fill="#5a7080" font-size="9"  font-family="Courier New">S</text>
        <text x="82" y="54" text-anchor="middle" fill="#5a7080" font-size="9"  font-family="Courier New">E</text>
        <text x="18" y="54" text-anchor="middle" fill="#5a7080" font-size="9"  font-family="Courier New">W</text>
        <!-- Needle group (rotated by JS) -->
        <g id="compass-needle" transform="rotate(0,50,50)">
          <polygon points="50,16 46,50 54,50" fill="#ff4060"/>
          <polygon points="50,84 46,50 54,50" fill="#1e2d3d"/>
        </g>
        <!-- Center dot -->
        <circle cx="50" cy="50" r="3" fill="#00d4ff"/>
      </svg>
      <div id="compass-bearing">---°</div>
      <div id="compass-cardinal">--</div>
    </div>

    <div class="hud-panel-title" style="margin-top:8px;">HEADING CONTROL</div>
    <div class="heading-control-group">
      <input type="number" id="heading-input" min="0" max="359" step="1" value="0" title="Target heading in degrees (0=N, 90=E)">
      <span class="unit">°</span>
      <button id="btn-set-heading" title="Set robot heading target">Set</button>
    </div>
    <div class="heading-control-group" style="margin-top:3px;">
      <button id="btn-lock-yaw" class="btn-toggle" title="Lock yaw / show current heading">Lock Yaw</button>
    </div>

    <div class="hud-value"><span class="hud-label">TARGET</span><span class="hud-num" id="heading-target-val">--</span></div>
    <div class="hud-value"><span class="hud-label">ERR</span><span class="hud-num" id="heading-error-val">--</span></div>

    <div class="hud-panel-title" style="margin-top:8px;">ORIENTATION</div>
    <div class="hud-value"><span class="hud-label">ROLL</span><span class="hud-num" id="roll-val">--</span></div>
    <div class="hud-value"><span class="hud-label">PITCH</span><span class="hud-num" id="pitch-val">--</span></div>
    <div class="hud-value"><span class="hud-label">YAW</span><span class="hud-num" id="yaw-val">--</span></div>

    <div class="hud-panel-title" style="margin-top:8px;">STATUS</div>
    <div class="hud-value"><span class="hud-label">MODE</span><span class="hud-num" id="mode-val">--</span></div>
    <div class="hud-value"><span class="hud-label">LINEAR</span><span class="hud-num" id="linear-val">--</span></div>
    <div class="hud-value"><span class="hud-label">ANGULAR</span><span class="hud-num" id="angular-val">--</span></div>
  </div>

  <!-- ── Top-right HUD: RTK GPS ── -->
  <div id="hud-right">
    <div id="rtk-header">
      <span id="rtk-title">RTK GPS</span>
      <span id="rtk-fix-badge">NO FIX</span>
      <span id="rtk-live-dot" title="RTK OFFLINE"></span>
    </div>
    <div class="rtk-cell">
      <span class="rtk-cell-label">LAT</span>
      <span class="rtk-cell-val accent" id="rtk-lat">--</span>
    </div>
    <div class="rtk-cell">
      <span class="rtk-cell-label">LON</span>
      <span class="rtk-cell-val accent" id="rtk-lon">--</span>
    </div>
    <div class="rtk-cell">
      <span class="rtk-cell-label">ALT (m)</span>
      <span class="rtk-cell-val" id="rtk-alt">--</span>
    </div>
    <div id="rtk-sats-row">
      <div class="rtk-cell">
        <span class="rtk-cell-label">SATS</span>
        <span class="rtk-cell-val" id="rtk-sats">--</span>
      </div>
    </div>
  </div>

  <!-- ── Bottom Control Bar: Speed + Navigation ── -->
  <div id="bottom-bar">
    <span id="speed-label">SPD</span>
    <input type="range" id="speed-slider" min="10" max="100" step="10" value="50">
    <span id="speed-value">50%</span>
    <input type="file" id="csv-file-input" accept=".csv,text/csv">
    <button id="nav-upload-btn">📂 CSV</button>
    <span id="nav-wp-count">0 WP</span>
    <button class="nav-mode-btn active" id="btn-p2p"     title="Point To Point Direct Navigation">P2P</button>
    <button class="nav-mode-btn"        id="btn-pursuit" title="Pure Pursuit Path Tracking">PURSUIT</button>
    <button id="nav-auto-btn" class="nav-idle">▶ AUTO</button>
    <button id="nav-force-btn" class="nav-mode-btn" title="Force start navigation even without GPS fix">FORCE</button>
    <button id="cov-toggle-btn" class="nav-mode-btn" title="Coverage Path Planner">COV</button>
  </div>

  <!-- ── Coverage Path Planner Modal ── -->
  <div id="cov-modal">
    <div id="cov-panel">
      <div class="cov-panel-title">COVERAGE PATH PLANNER</div>
      <div class="cov-row">
        <label class="cov-label">ROW SPACING (m)</label>
        <input type="number" id="cov-spacing" value="1.0" min="0.1" max="50" step="0.1">
      </div>
      <div class="cov-row">
        <label class="cov-label">DIRECTION (° compass, 0=N-S rows)</label>
        <input type="number" id="cov-direction" value="0" min="0" max="359" step="1">
      </div>
      <div class="cov-row">
        <label class="cov-label">OVERLAP (%)</label>
        <input type="number" id="cov-overlap" value="0" min="0" max="90" step="5">
      </div>
      <div class="cov-row">
        <label class="cov-label">TOLERANCE (m)</label>
        <input type="number" id="cov-tolerance" value="1.0" min="0.1" max="10" step="0.1">
      </div>
      <div class="cov-row">
        <label class="cov-label">BOUNDARY POINTS (one lat,lon per line)</label>
        <textarea id="cov-boundary" rows="5" placeholder="37.123456,-122.123456&#10;37.123500,-122.123456&#10;37.123500,-122.123000&#10;37.123456,-122.123000"></textarea>
      </div>
      <div id="cov-status"></div>
      <button id="cov-gen-btn">⚡ GENERATE PATH</button>
      <button id="cov-close-btn">✕ CLOSE</button>
    </div>
  </div>

  <!-- AUTO MODE overlay -->
  <div id="auto-overlay">
    <div id="auto-overlay-text">AUTO MODE</div>
    <div id="auto-overlay-sub">JOYSTICK DISABLED</div>
  </div>

  <!-- Hidden Joy Data Element -->
  <div id="joy-data-hidden">
    <span id="joy-force"></span>
    <span id="joy-linear"></span>
    <span id="joy-angular"></span>
    <span id="joy-dir"></span>
  </div>

</div>

<script src="/nipplejs.min.js"></script>
<script src="/visualizer.js"></script>
</body>
</html>
