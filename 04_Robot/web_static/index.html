<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Farm Robot Control</title>
<link rel="stylesheet" href="/style.css">
<style>
  #json-panel {
    position: fixed;
    top: 50px;
    right: 8px;
    width: 260px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    z-index: 10;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .json-block { background: rgba(0,0,0,0.75); border-radius: 4px; padding: 6px 8px; }
  .json-type { color: #4f4; font-family: monospace; font-size: 0.7rem; margin-bottom: 2px; }
  .json-block pre { color: #eee; font-family: monospace; font-size: 0.7rem; line-height: 1.4; margin: 0; white-space: pre-wrap; }
</style>
</head>
<body>

<div id="app">

  <!-- ── Fullscreen joystick ── -->
  <div id="joystick-zone">
    <span id="joystick-hint">TOUCH TO CONTROL</span>
    <div id="auto-overlay">
      <div id="auto-overlay-text">AUTO MODE</div>
      <div id="auto-overlay-sub">JOYSTICK DISABLED</div>
    </div>
  </div>

  <!-- Warning banner -->
  <div id="warn-banner">⚠ CONNECTION LOST — ROBOT STOPPED</div>

  <!-- ── Top bar ── -->
  <div id="top-bar">
    <span class="title">FARMBOT</span>
    <span id="status-dot"></span>
    <span id="status-text">OFFLINE</span>
    <button id="state-btn" class="state-ready" disabled>
      <span id="state-indicator">●</span>
      <span id="state-label">ACTIVATE</span>
    </button>
    <button id="rec-btn" class="rec-idle">● REC</button>
    <span id="rec-filename">—</span>
  </div>

  <!-- ── Raw JSON panels ── -->
  <div id="json-panel">
    <div class="json-block"><div class="json-type">odom</div><pre id="json-odom">—</pre></div>
    <div class="json-block"><div class="json-type">imu</div><pre id="json-imu">—</pre></div>
    <div class="json-block"><div class="json-type">rtk</div><pre id="json-rtk">—</pre></div>
  </div>

  <!-- ── Bottom Control Bar ── -->
  <div id="bottom-bar">
    <span id="speed-label">SPD</span>
    <input type="range" id="speed-slider" min="10" max="100" step="10" value="50">
    <span id="speed-value">50%</span>
    <input type="file" id="csv-file-input" accept=".csv,text/csv">
    <button id="nav-upload-btn">📂 CSV</button>
    <span id="nav-wp-count">0 WP</span>
    <button class="nav-mode-btn active" id="btn-p2p"     title="Point To Point">P2P</button>
    <button class="nav-mode-btn"        id="btn-pursuit" title="Pure Pursuit">PURSUIT</button>
    <button class="nav-mode-btn active" id="btn-mavg"    title="Moving Average">M-AVG</button>
    <button class="nav-mode-btn"        id="btn-kalman"  title="Kalman Filter">KALMAN</button>
    <button id="nav-auto-btn" class="nav-idle">▶ AUTO</button>
    <button id="nav-force-btn" class="nav-mode-btn" title="Force start">FORCE</button>
    <button id="cov-toggle-btn" class="nav-mode-btn" title="Coverage Path">COV</button>
  </div>

  <!-- ── Coverage Path Planner Modal ── -->
  <div id="cov-modal">
    <div id="cov-panel">
      <div class="cov-panel-title">COVERAGE PATH PLANNER</div>
      <div class="cov-row">
        <label class="cov-label">ROW SPACING (m)</label>
        <input type="number" id="cov-spacing" value="1.0" min="0.1" max="50" step="0.1">
      </div>
      <div class="cov-row">
        <label class="cov-label">DIRECTION (° compass, 0=N-S rows)</label>
        <input type="number" id="cov-direction" value="0" min="0" max="359" step="1">
      </div>
      <div class="cov-row">
        <label class="cov-label">OVERLAP (%)</label>
        <input type="number" id="cov-overlap" value="0" min="0" max="90" step="5">
      </div>
      <div class="cov-row">
        <label class="cov-label">TOLERANCE (m)</label>
        <input type="number" id="cov-tolerance" value="1.0" min="0.1" max="10" step="0.1">
      </div>
      <div class="cov-row">
        <label class="cov-label">BOUNDARY POINTS (one lat,lon per line)</label>
        <textarea id="cov-boundary" rows="5" placeholder="37.123456,-122.123456&#10;37.123500,-122.123456"></textarea>
      </div>
      <div id="cov-status"></div>
      <button id="cov-gen-btn">⚡ GENERATE PATH</button>
      <button id="cov-close-btn">✕ CLOSE</button>
    </div>
  </div>

  <!-- Hidden joy data -->
  <div id="joy-data-hidden" style="display:none">
    <span id="joy-force"></span>
    <span id="joy-linear"></span>
    <span id="joy-angular"></span>
    <span id="joy-dir"></span>
  </div>

  <!-- Hidden stubs for app.js element references -->
  <div style="display:none">
    <span id="imu-roll"></span><span id="imu-pitch"></span><span id="imu-yaw"></span>
    <span id="nav-heading"></span><span id="nav-cardinal"></span>
    <span id="odom-v"></span><span id="odom-w"></span><span id="odom-state"></span>
    <span id="amiga-soc"></span>
    <div id="rtk-header">
      <span id="rtk-title"></span>
      <span id="rtk-fix-badge"></span>
      <span id="rtk-live-dot"></span>
    </div>
    <span id="rtk-lat"></span><span id="rtk-lon"></span><span id="rtk-alt"></span>
    <span id="rtk-sats"></span><span id="rtk-hdop"></span><span id="rtk-spd"></span>
    <div id="nav-status-panel">
      <span id="nav-progress"></span><span id="nav-dist"></span>
      <span id="nav-bearing"></span><span id="nav-mode-disp"></span>
      <span id="nav-filter-disp"></span><span id="nav-tol"></span>
    </div>
  </div>

</div>

<script>
  const panels = { odom: document.getElementById('json-odom'), imu: document.getElementById('json-imu'), rtk: document.getElementById('json-rtk') };
  const lastUpdate = { odom: 0, imu: 0, rtk: 0 };
  const wsPort = Number(window.location.port || 8888) + 1;
  const wsJson = new WebSocket(`ws://${window.location.hostname}:${wsPort}`);
  wsJson.onmessage = e => {
    const now = Date.now();
    const msg = JSON.parse(e.data);
    const type = msg.type === 'imu' ? 'imu' : msg.type === 'rtk' ? 'rtk' : msg.type === 'odom' ? 'odom' : null;
    if (!type || !panels[type]) return;
    if (now - lastUpdate[type] < 300) return;
    lastUpdate[type] = now;
    panels[type].textContent = JSON.stringify(msg, null, 2);
  };
</script>
<script src="/nipplejs.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
